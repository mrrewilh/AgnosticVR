appId: com.agnosticvr
productName: agnosticvr
directories:
  buildResources: build
icon: build/icon
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
asarUnpack:
  - resources/**
extraResources:
  - from: resources/bin/${os}
    to: bin
    filter:
      - '**/*'
  - from: resources/bin
    to: bin
    filter:
      - '*'
win:
  target:
    - target: nsis
      arch:
        - x64
        - ia32
    - target: portable
      arch:
        - x64
        - ia32
  executableName: agnosticvr
nsis:
  artifactName: ${name}-${version}-setup-${arch}.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
portable:
  artifactName: ${name}-${version}-portable-${arch}.${ext}
linux:
  target:
    - target: AppImage
      arch:
        - x64
        - arm64
    - target: deb
      arch:
        - x64
        - arm64
    - target: rpm
      arch:
        - x64
        - arm64
  maintainer: electronjs.org
  category: Utility
appImage:
  artifactName: ${name}-${version}-${arch}.${ext}
deb:
  artifactName: ${name}-${version}-${arch}.${ext}
rpm:
  artifactName: ${name}-${version}-${arch}.${ext}
  fpm:
    - --rpm-rpmbuild-define=_build_id_links none
    - --rpm-rpmbuild-define=__strip /bin/true
    - --rpm-rpmbuild-define=__find_requires /bin/true
    - --rpm-rpmbuild-define=__find_provides /bin/true
    - --rpm-rpmbuild-define=debug_package %{nil}
npmRebuild: false
publish:
  provider: github
  owner: slax81
  repo: agnosticvr
electronDownload:
  mirror: https://npmmirror.com/mirrors/electron/
